<body>

    <main class="reels_section">

        <section class="title">
            <h2 class="Cad_User">Cadastro de Usuário</h2>
            <div class="title_detail">
                <hr>
                <img src="img/icons/losango.png">
                <hr>
            </div>
        </section>

        <form action="mailto:daviunha1706" method="post" class="form_user">
            <table class="tabela_form">
                <tr>
                    <td><label for="nome">Nome:</label></td>
                    <td><input type="text" name="nome" id="nome" required></td>

                    <td><label for="telefone">Telefone:</label></td>
                    <td><input type="tel" name="telefone" id="telefone" placeholder="(XX)XXXXX-XXXX"></td>
                </tr>
                <tr>
                    <td><label for="email">E-mail:</label></td>
                    <td><input type="email" name="email" id="email" placeholder="seuemail@exemplo.com" required></td>

                    <td><label for="estado_civil">Estado Civil:</label></td>
                    <td><select name="estado_civil" id="estado_civil" required>
                            <option value="solteiro">Solteiro(a)</option>
                            <option value="casado">Casado(a)</option>
                            <option value="divorciado">Divorciado(a)</option>
                            <option value="viuvo">Viúvo(a)</option>
                        </select></td>
                </tr>
                <tr>
                    <td>Sexo:</td>
                    <td>
                        <label for="sexo">Masculino</label>
                        <input type="radio" name="masculino" id="masculino">
                    </td>
                    <td>
                        <label for="sexo">Feminino</label>
                        <input type="radio" name="feminino" id="feminino">
                    </td>
                    <td>
                        <label for="sexo">Outro</label>
                        <input type="radio" name="outro" id="outro">
                    </td>

                </tr>
                <tr>
                    <td><label for="cidade">Cidade:</label></td>
                    <td><input type="text" name="cidade" id="cidade" required></td>
                    <td><label for="rua">Rua:</label></td>
                    <td><input type="text" name="rua" id="rua" required></td>
                </tr>
                <tr>
                    <td><label for="estado">Estado:</label></td>
                    <td><input type="text" name="estado" id="estado" required></td>
                    <td><label for="cep">CEP:</label></td>
                    <td><input type="text" name="cep" id="cep" placeholder="XXXXX-XXX" required></td>
                </tr>
                <tr>
                    <td><label for="obs">Observações:</label></td>
                    <td><textarea name="obs" id="obs">Escreva observações aqui</textarea></td>
                </tr>
            </table>
        </form>
    </main>

                        <a href="mailto:gui.alexander1@gmail.com" target="_blank"><img src="img/icons/email.png"></a>

                    </div>
                </section>

                <section class="footer_icons_streaming_container">

                    <div class="footer_icons_streaming">

            <div id="footer_division">

            </div>
